      html += `<div class="toggle-btn-group">`;
      html += `<button class="btn btn-small ${window._equipAddMode !== 'custom' ? 'active' : ''}" onclick="setEquipAddMode('database')">From Database</button>`;
      html += `<button class="btn btn-small ${window._equipAddMode === 'custom' ? 'active' : ''}" onclick="setEquipAddMode('custom')">Custom Item</button>`;
      html += `</div>`;

      if (window._equipAddMode === 'custom') {
        html += buildCustomItemForm();
      } else {
        html += buildDatabaseSearch();
      }

      html += `</div></div>`;
      return html;
    }

    function buildDatabaseSearch() {
      const query = (window._equipSearchQuery || '').toLowerCase();
      let html = `<input type="text" class="equip-search" id="equip-search-input" placeholder="Search weapons and armour..." value="${window._equipSearchQuery || ''}" oninput="equipSearchInput(this.value)" onfocus="equipSearchFocus()">`;

      if (window._equipSearchOpen) {
        const weaponResults = query.length > 0
          ? EQUIPMENT_DB.weapons.filter(w => w.name.toLowerCase().includes(query))
          : EQUIPMENT_DB.weapons;
        const armourResults = query.length > 0
          ? EQUIPMENT_DB.armour.filter(a => a.name.toLowerCase().includes(query))
          : EQUIPMENT_DB.armour;
        const allResults = [
          ...weaponResults.map(w => ({ ...w, _cat: 'weapon' })),
          ...armourResults.map(a => ({ ...a, _cat: 'armour' })),
        ];

        if (allResults.length === 0) {
          html += `<p style="font-size:0.85rem;color:var(--ink-light);text-align:center">No results</p>`;
        } else {
          html += `<div class="equip-db-results">`;
          allResults.forEach(item => {
            html += `<div class="equip-db-item">`;
            html += `<span class="equip-name" style="font-weight:bold;font-size:0.9rem">${item.name}</span>`;
            if (item._cat === 'weapon') {
              html += `<span class="equip-details">${item.dice}</span>`;
              (item.tags || []).forEach(t => {
                html += ` <span class="tag-badge">${t}</span>`;
              });
            } else {
              html += `<span class="type-badge">${item.type}</span>`;
              html += `<span class="equip-details">A[${item.score}]</span>`;
            }
            html += `<span class="type-badge rarity-${item.rarity}">${item.rarity}</span>`;
            html += `<div class="equip-actions">`;
            html += `<button class="btn btn-small" onclick="addDbItemEquipped('${item._cat}', '${item.id}')">Equip</button>`;
            html += `<button class="btn btn-small" onclick="addDbItemCarried('${item._cat}', '${item.id}')">Carry</button>`;
            html += `</div>`;
            html += `</div>`;
          });
          html += `</div>`;
        }
      }
      return html;
    }

    function buildCustomItemForm() {
      let html = `<div class="custom-item-form">`;
      html += `<div class="form-row"><label>Name</label><input type="text" id="custom-item-name" placeholder="Item name"></div>`;
      html += `<div class="form-row"><label>Type</label><select id="custom-item-type">
        <option value="weapon">Weapon</option>
        <option value="armour">Armour</option>
        <option value="item">Carried Item</option>
      </select></div>`;
      html += `<div class="form-row" id="custom-dice-row"><label>Dice</label><input type="text" id="custom-item-dice" placeholder="e.g. d8, 2d6"></div>`;
      html += `<div class="form-row" id="custom-score-row"><label>A Score</label><input type="number" id="custom-item-score" value="1" min="0" max="3"></div>`;
      html += `<div class="form-row" id="custom-armour-type-row"><label>Subtype</label><select id="custom-item-armour-type">
        <option value="shield">Shield</option>
        <option value="coat">Coat</option>
        <option value="helm">Helm</option>
        <option value="plates">Plates</option>
      </select></div>`;
      html += `<div class="form-row"><label>Tags</label><div class="tag-checkboxes">
        <label><input type="checkbox" id="custom-tag-hefty" value="hefty"> Hefty</label>
        <label><input type="checkbox" id="custom-tag-long" value="long"> Long</label>
        <label><input type="checkbox" id="custom-tag-slow" value="slow"> Slow</label>
      </div></div>`;
      html += `<div class="form-row"><label>Notes</label><input type="text" id="custom-item-notes" placeholder="Optional notes"></div>`;
      html += `<button class="btn btn-small" onclick="addCustomItem()">Add Item</button>`;
      html += `</div>`;
      return html;
    }

    function renderEquipment() {
      const el = document.getElementById('tab-equipment');
      if (!currentChar) return;

      // Ensure arrays exist (migration for older characters)
      if (!currentChar.weapons) currentChar.weapons = [];
      if (!currentChar.armour) currentChar.armour = [];
      if (!currentChar.carried) currentChar.carried = [];
      if (!currentChar.inventory) currentChar.inventory = [];

      let html = '';
      html += buildEquippedArmourPanel();
      html += buildEquippedWeaponsPanel();
      html += '<hr class="section-divider">';
      html += buildCarriedPanel();
      html += buildInventoryPanel();
      html += '<hr class="section-divider">';
      html += buildAddItemPanel();

      el.innerHTML = html;

      // Restore search focus after re-render
      setTimeout(() => {
        const searchInput = document.getElementById('equip-search-input');
        if (searchInput && window._equipSearchOpen) {
          searchInput.focus();
          searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
        }
        // Show/hide custom form fields based on type
        const typeSelect = document.getElementById('custom-item-type');
        if (typeSelect) {
          typeSelect.addEventListener('change', updateCustomFormVisibility);
          updateCustomFormVisibility();
        }
      }, 0);
    }

    function updateCustomFormVisibility() {
      const type = document.getElementById('custom-item-type')?.value;
      const diceRow = document.getElementById('custom-dice-row');
      const scoreRow = document.getElementById('custom-score-row');
      const armourTypeRow = document.getElementById('custom-armour-type-row');
      if (diceRow) diceRow.style.display = (type === 'weapon' || type === 'armour') ? 'flex' : 'none';
      if (scoreRow) scoreRow.style.display = type === 'armour' ? 'flex' : 'none';
      if (armourTypeRow) armourTypeRow.style.display = type === 'armour' ? 'flex' : 'none';
    }

    // --- Equipment Actions ---

    window._equipAddMode = 'database';
    window._equipSearchQuery = '';
    window._equipSearchOpen = false;

    function setEquipAddMode(mode) {
      window._equipAddMode = mode;
      window._equipSearchOpen = false;
      renderEquipment();
    }

    function equipSearchInput(val) {
      window._equipSearchQuery = val;
      window._equipSearchOpen = true;
      renderEquipment();
    }

    function equipSearchFocus() {
      if (!window._equipSearchOpen) {
        window._equipSearchOpen = true;
        renderEquipment();
      }
    }

    function toggleArmourTrapped(index) {
      updateChar(c => {
        if (c.armour[index]) c.armour[index].trapped = !c.armour[index].trapped;
      });
    }

    function toggleWeaponImpaired(index) {
      updateChar(c => {
        if (c.weapons[index]) c.weapons[index].weaponImpaired = !c.weapons[index].weaponImpaired;
      });
    }

    function unequipArmour(index) {
      updateChar(c => {
        const item = c.armour.splice(index, 1)[0];
        if (item) {
          const aType = getArmourType(item);
          c.carried.push({ name: item.name, type: 'armour (' + aType + ')', details: 'A[' + (item.score || 0) + ']', _source: item });
        }
      });
    }

    function unequipWeapon(index) {
      updateChar(c => {
        const item = c.weapons.splice(index, 1)[0];
        if (item) {
          c.carried.push({ name: item.name, type: 'weapon', details: item.dice + (item.tags?.length ? ' [' + item.tags.join(', ') + ']' : ''), _source: item });
        }
      });
    }

    function equipCarriedItem(index) {
      const c = currentChar;
      const item = c.carried[index];
      if (!item) return;

      // If it has a _source, re-equip from source data
      if (item._source) {
        const src = item._source;
        if (src.type === 'armour' || (src.armourType)) {
          const aType = getArmourType(src);
          if (!canEquipArmourType(aType)) {
            alert('Already have a ' + aType + ' equipped. Unequip it first.');
            return;
          }
          updateChar(c => {
            c.carried.splice(index, 1);
            c.armour.push({ ...src, trapped: false });
          });
        } else {
          updateChar(c => {
            c.carried.splice(index, 1);
            c.weapons.push({ ...src, weaponImpaired: false });
          });
        }
        return;
      }

      // Generic carried item - can't auto-equip, just alert
      alert('This item cannot be directly equipped. Use the Add Item panel to create a weapon or armour piece.');
    }

    function dropCarriedItem(index) {
      const item = currentChar.carried[index];
      if (!item) return;
      if (!confirm('Drop ' + item.name + '? This will remove it permanently.')) return;
      const itemSnapshot = JSON.parse(JSON.stringify(item));
      updateChar(c => {
        c.carried.splice(index, 1);
      });
      addRestorableJournalEntry('Dropped item: ' + itemSnapshot.name, 'item_drop', { source: 'carried', item: itemSnapshot });
    }

    function removeInventoryItem(index) {
      const itemText = currentChar.inventory[index];
      updateChar(c => {
        c.inventory.splice(index, 1);
      });
      addRestorableJournalEntry('Removed from inventory: ' + itemText, 'inventory_drop', { item: itemText });
    }

    function addInventoryItem() {
      const input = document.getElementById('inv-add-input');
      if (!input || !input.value.trim()) return;
      const val = input.value.trim();
      updateChar(c => {
        c.inventory.push(val);
      });
    }

    function addDbItemEquipped(cat, id) {
      if (cat === 'weapon') {
        const dbItem = EQUIPMENT_DB.weapons.find(w => w.id === id);
        if (!dbItem) return;
        updateChar(c => {
          c.weapons.push({
            name: dbItem.name,
            dice: dbItem.dice,
            tags: [...(dbItem.tags || [])],
            notes: dbItem.notes || '',
            weaponImpaired: false,
            custom: false,
            type: 'weapon',
          });
        });
        addJournalEntry('Equipped weapon: ' + dbItem.name, true);
      } else {
        const dbItem = EQUIPMENT_DB.armour.find(a => a.id === id);
        if (!dbItem) return;
        if (!canEquipArmourType(dbItem.type)) {
          alert('Already have a ' + dbItem.type + ' equipped. Unequip it first.');
          return;
        }
        updateChar(c => {
          c.armour.push({
            name: dbItem.name,
            armourType: dbItem.type,
            type: 'armour',
            score: dbItem.score,
            dice: dbItem.dice || null,
            notes: '',
            trapped: false,
          });
        });
        addJournalEntry('Equipped armour: ' + dbItem.name, true);
      }
    }

    function addDbItemCarried(cat, id) {
      if (cat === 'weapon') {
        const dbItem = EQUIPMENT_DB.weapons.find(w => w.id === id);
        if (!dbItem) return;
        const src = {
          name: dbItem.name,
          dice: dbItem.dice,
          tags: [...(dbItem.tags || [])],
          notes: dbItem.notes || '',
          weaponImpaired: false,
          custom: false,
          type: 'weapon',
        };
        updateChar(c => {
          c.carried.push({ name: dbItem.name, type: 'weapon', details: dbItem.dice, _source: src });
        });
      } else {
        const dbItem = EQUIPMENT_DB.armour.find(a => a.id === id);
        if (!dbItem) return;
        const src = {
          name: dbItem.name,
          armourType: dbItem.type,
          type: 'armour',
          score: dbItem.score,
          dice: dbItem.dice || null,
          notes: '',
          trapped: false,
        };
        updateChar(c => {
          c.carried.push({ name: dbItem.name, type: 'armour (' + dbItem.type + ')', details: 'A[' + dbItem.score + ']', _source: src });
        });
      }
    }

    function addCustomItem() {
      const name = document.getElementById('custom-item-name')?.value?.trim();
      const type = document.getElementById('custom-item-type')?.value;
      const dice = document.getElementById('custom-item-dice')?.value?.trim();
      const score = parseInt(document.getElementById('custom-item-score')?.value) || 0;
      const armourType = document.getElementById('custom-item-armour-type')?.value;
      const notes = document.getElementById('custom-item-notes')?.value?.trim() || '';
      const tags = [];
      if (document.getElementById('custom-tag-hefty')?.checked) tags.push('hefty');
      if (document.getElementById('custom-tag-long')?.checked) tags.push('long');
      if (document.getElementById('custom-tag-slow')?.checked) tags.push('slow');

      if (!name) { alert('Please enter an item name.'); return; }

      if (type === 'weapon') {
        updateChar(c => {
          c.weapons.push({ name, dice: dice || 'd6', tags, notes, weaponImpaired: false, custom: true, type: 'weapon' });
        });
        addJournalEntry('Added custom weapon: ' + name, true);
      } else if (type === 'armour') {
        if (!canEquipArmourType(armourType)) {
          alert('Already have a ' + armourType + ' equipped. Unequip it first.');
          return;
        }
        updateChar(c => {
          c.armour.push({ name, armourType, type: 'armour', score, dice: armourType === 'shield' ? (dice || 'd4') : null, notes, trapped: false });
        });
        addJournalEntry('Added custom armour: ' + name, true);
      } else {
        // Carried item
        updateChar(c => {
          c.carried.push({ name, type: 'item', details: notes });
        });
        addJournalEntry('Added item: ' + name, true);
      }
    }
    // === BATTLE TAB ===

    // Module-level battle state (not persisted)
    let battleBonusDice = [];
    let battleWeaponChecked = {};
    let battleCharging = false;
    let battleImpairedOverride = false;
    let battleRollResults = null;
    let battleMounted = true;
    let lastDamageSummary = null;

    function renderBattle() {
      const el = document.getElementById('tab-battle');
      if (!currentChar) { el.innerHTML = '<p class="placeholder">No character loaded</p>'; return; }
      const c = currentChar;

      // Ensure feats state exists
      if (!c.feats) c.feats = { smite: 'available', focus: 'available', deny: 'available' };

      let html = '';
      html += buildBattleStatBar();
      html += buildDicePoolPanel();
      html += buildAttackStepsPanel();
      html += '<hr class="section-divider">';
      html += buildFeatsPanel();
      html += buildGambitsPanel();
      html += '<hr class="section-divider">';
      html += buildDamageCalcPanel();
      if (c.mount) html += buildMountedCombatPanel();

      el.innerHTML = html;

      // Wire up collapsible panels
      setTimeout(() => {
        el.querySelectorAll('.collapsible .panel-header').forEach(hdr => {
          hdr.addEventListener('click', () => {
            hdr.parentElement.classList.toggle('collapsed');
          });
        });
      }, 0);
    }

    // --- Battle Stat Bar ---
    function buildBattleStatBar() {
      const c = currentChar;
      const armourTotal = calcArmourTotal();
      const conditions = [];
      if (c.conditions.wounded) conditions.push('Wounded');
      if (c.conditions.mortalWound) conditions.push('Mortal Wound');
      if (c.conditions.doomScar) conditions.push('Doom');
      if (c.conditions.customConditions) {
        c.conditions.customConditions.forEach(cc => conditions.push(cc));
      }

      let html = '<div class="battle-stat-bar">';
      html += `<span class="stat-chip"><span class="stat-label">GD</span> ${c.gd.current}/${c.gd.max}</span>`;
      html += `<span class="stat-chip"><span class="stat-label">VIG</span> ${c.virtues.vig.current}</span>`;
      html += `<span class="stat-chip"><span class="stat-label">Armour</span> ${armourTotal}</span>`;
      conditions.forEach(cond => {
        html += `<span class="condition-chip">${cond}</span>`;
      });
      if (c.mount) {
        html += `<span class="mount-chip">Mounted (${c.mount.name})</span>`;
      }
      html += '</div>';
      return html;
    }

    // --- Dice Pool Builder ---
    function buildDicePoolPanel() {
      const c = currentChar;
      const weapons = c.weapons || [];
      const isAutoImpaired = c.virtues.spi.current === 0;
      const isImpaired = battleImpairedOverride || isAutoImpaired;

      let html = '<div class="panel"><div class="panel-header">Your Attack' + helpBtn('your-attack') + '</div><div class="panel-body">';

      // Weapon checkboxes
      html += '<div style="margin-bottom:8px"><strong style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-light)">Weapons</strong></div>';
      if (weapons.length === 0) {
        html += '<p style="font-size:0.85rem;color:var(--ink-light);font-style:italic">No weapons equipped</p>';
      } else {
        weapons.forEach((w, i) => {
          const checked = battleWeaponChecked[i] ? ' checked' : '';
          const impTag = w.weaponImpaired ? ' <span style="color:var(--danger);font-size:0.8rem">(Impaired→d4)</span>' : '';
          html += `<div class="weapon-check">
            <label><input type="checkbox" onchange="battleToggleWeapon(${i})"${checked}> ${w.name} <span class="weapon-dice">${w.dice}</span>${impTag}</label>
          </div>`;
        });
      }

      // Shield die
      const shield = (c.armour || []).find(a => getArmourType(a) === 'shield' && !a.trapped);
      if (shield) {
        const shieldDice = shield.dice || 'd4';
        html += `<div style="margin-top:6px;font-size:0.9rem"><span style="color:var(--success)">&#9632;</span> Shield die: <strong>${shieldDice}</strong> (auto-included)${helpBtn('shield-die', true)}</div>`;
      }

      // Mount / Charging
      if (c.mount) {
        const trample = c.mount.trample || null;
        html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(196,165,110,0.2)">';
        html += '<strong style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-light)">Mount</strong>';
        if (trample) {
          const chk = battleCharging ? ' checked' : '';
          html += `<div class="weapon-check"><label><input type="checkbox" onchange="battleToggleCharge()"${chk}> Charging &mdash; adds ${trample} trample die${helpBtn('charging', true)}</label></div>`;
        } else {
          html += '<p style="font-size:0.85rem;color:var(--ink-light)">Mount has no trample die</p>';
        }
        html += '</div>';
      }

      // Bonus dice
      html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(196,165,110,0.2)">';
      html += '<strong style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink-light)">Bonus Dice</strong>' + helpBtn('bonus-dice', true);
      html += '<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
      html += '<button class="btn btn-small" onclick="battleAddBonus(\'d8\')">+d8</button>';
      html += '<button class="btn btn-small" onclick="battleAddBonus(\'d10\')">+d10</button>';
      html += '<select id="battle-custom-die" style="padding:4px 6px;font-size:0.85rem">';
      ['d4','d6','d8','d10','d12'].forEach(d => { html += `<option value="${d}">${d}</option>`; });
      html += '</select>';
      html += '<button class="btn btn-small" onclick="battleAddCustomBonus()">Add</button>';
      html += '</div>';
      if (battleBonusDice.length > 0) {
        html += '<div class="bonus-dice-list">';
        battleBonusDice.forEach((d, i) => {
          html += `<span class="bonus-die-tag">${d} <span class="remove-bonus" onclick="battleRemoveBonus(${i})">&times;</span></span>`;
        });
        html += '</div>';
      }
      html += '</div>';

      // Impaired toggle
      html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(196,165,110,0.2)">';
      const impChk = battleImpairedOverride ? ' checked' : '';
      html += `<label style="font-size:0.9rem;cursor:pointer"><input type="checkbox" onchange="battleToggleImpaired()"${impChk}> <strong>Impaired</strong></label>${helpBtn('battle-impaired', true)}`;
      if (isAutoImpaired && !battleImpairedOverride) {
        html += ' <span style="color:var(--danger);font-size:0.82rem">(auto: SPI = 0)</span>';
      }
      if (isImpaired) {
        html += '<div class="impaired-warning">IMPAIRED: Entire dice pool reduced to d4 only.</div>';
      }
      html += '</div>';

      // Pool display
      const pool = buildCurrentPool();
      html += '<div class="dice-pool-display">';
      if (pool.length === 0) {
        html += '<span class="pool-empty">Select weapons or add dice to build your pool</span>';
      } else if (isImpaired) {
        html += 'Dice Pool: <span style="color:var(--danger)">d4</span> (Impaired)';
      } else {
        html += 'Dice Pool: ' + pool.map(p => {
          let style = '';
          if (p.source === 'shield') style = ' style="color:var(--success)"';
          else if (p.source === 'trample') style = ' style="color:var(--gold)"';
          else if (p.source === 'bonus') style = ' style="color:#4a0e8f"';
          return `<span${style}>${p.dice}</span>`;
        }).join(' + ') + pool.map(p => {
          // Add source labels
          return '';
        }).join('');
        // Build a labeled version
        html = html.replace(/Dice Pool: .*/, ''); // remove the plain version
        html += 'Dice Pool: ' + pool.map(p => {
          let style = '';
          let label = '';
          if (p.source === 'shield') { style = ' style="color:var(--success)"'; label = ' (shield)'; }
          else if (p.source === 'trample') { style = ' style="color:var(--gold)"'; label = ' (charge)'; }
          else if (p.source === 'bonus') { style = ' style="color:#4a0e8f"'; label = ' (bonus)'; }
          return `<span${style}>${p.dice}${label}</span>`;
        }).join(' + ');
      }
      html += '</div>';

      // Roll button
      html += `<button class="roll-btn" onclick="battleRollPool()" ${pool.length === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>Roll Attack</button>`;

      // Roll results
      if (battleRollResults) {
        html += buildRollResultsDisplay();
      }

      html += '</div></div>';
      return html;
    }

    function buildCurrentPool() {
      const c = currentChar;
      const pool = [];

      // Weapons
      (c.weapons || []).forEach((w, i) => {
        if (battleWeaponChecked[i]) {
          const dice = w.weaponImpaired ? 'd4' : w.dice;
          pool.push({ dice, source: 'weapon', name: w.name });
        }
      });

      // Shield die
      const shield = (c.armour || []).find(a => getArmourType(a) === 'shield' && !a.trapped);
      if (shield) {
        pool.push({ dice: shield.dice || 'd4', source: 'shield', name: 'Shield' });
      }

      // Charging trample
      if (battleCharging && c.mount && c.mount.trample) {
        pool.push({ dice: c.mount.trample, source: 'trample', name: 'Trample' });
      }

      // Bonus dice
      battleBonusDice.forEach(d => {
        pool.push({ dice: d, source: 'bonus', name: 'Bonus' });
      });

      return pool;
    }

    function battleToggleWeapon(index) {
      battleWeaponChecked[index] = !battleWeaponChecked[index];
      battleRollResults = null;
      renderBattle();
    }

    function battleToggleCharge() {
      battleCharging = !battleCharging;
      battleRollResults = null;
      renderBattle();
    }

    function battleToggleImpaired() {
      battleImpairedOverride = !battleImpairedOverride;
      battleRollResults = null;
      renderBattle();
    }

    function battleAddBonus(die) {
      battleBonusDice.push(die);
      battleRollResults = null;
      renderBattle();
    }

    function battleAddCustomBonus() {
      const sel = document.getElementById('battle-custom-die');
      if (sel) {
        battleBonusDice.push(sel.value);
        battleRollResults = null;
        renderBattle();
      }

    function battleRemoveBonus(index) {
      battleBonusDice.splice(index, 1);

    function battleRollPool() {
      const c = currentChar;
      const isImpaired = battleImpairedOverride || c.virtues.spi.current === 0;
      const pool = buildCurrentPool();
      if (pool.length === 0) return;

      if (isImpaired) {
        // Impaired: roll a single d4
        const result = rollDie(4);
        battleRollResults = {
          impaired: true,
          dice: [{ sides: 4, result, source: 'impaired', name: 'Impaired' }],
          highest: result,
        };
      } else {
        // Roll each die in pool, expanding multi-dice (e.g. 2d10)
        const results = [];
        pool.forEach(p => {
          const parsed = parseDice(p.dice);
          if (parsed) {
            for (let i = 0; i < parsed.count; i++) {
              results.push({ sides: parsed.sides, result: rollDie(parsed.sides), source: p.source, name: p.name });
            }
          }
        });
        const highest = Math.max(...results.map(r => r.result));
        battleRollResults = {
          impaired: false,
          dice: results,
          highest,
        };
      }
      renderBattle();
    }

    function buildRollResultsDisplay() {
      const r = battleRollResults;
      if (!r) return '';
      let html = '<div class="dice-results-area">';
      html += '<div style="font-weight:bold;font-family:var(--font-serif);margin-bottom:6px">Roll Results</div>';

      let gambitCount = 0;
      let strongGambitCount = 0;

      r.dice.forEach(d => {
        let classes = 'dice-result';
        let label = '';
        const isHighest = d.result === r.highest;
        if (isHighest) classes += ' highest';
        if (d.result >= 8) { classes += ' strong-gambit'; strongGambitCount++; label = 'Strong'; }
        else if (d.result >= 4) { classes += ' gambit'; gambitCount++; label = 'Gambit'; }
        if (isHighest) label = 'Highest' + (label ? ' / ' + label : '');

        html += `<div class="dice-result-wrap">`;
        html += `<div class="${classes}">${d.result}</div>`;
        html += `<span class="result-label">${d.source === 'impaired' ? 'd4' : 'd' + d.sides}${d.source !== 'weapon' && d.source !== 'impaired' ? ' (' + d.source + ')' : ''}</span>`;
        if (label) html += `<span class="result-label" style="font-weight:bold">${label}</span>`;
        html += '</div>';
      });
      html += '</div>';

      // Summary
      html += '<div class="roll-results-summary">';
      html += `<strong>Highest Die:</strong> ${r.highest}`;
      const eligibleGambits = r.dice.filter(d => d.result >= 4 && d.result !== r.highest).length;
      const eligibleStrong = r.dice.filter(d => d.result >= 8 && d.result !== r.highest).length;
      html += `<br><strong>Gambit-eligible dice (4+):</strong> ${eligibleGambits}`;
      if (eligibleStrong > 0) {
        html += `<br><strong style="color:#4a0e8f">Strong Gambit dice (8+):</strong> ${eligibleStrong}`;
      }
      html += '</div>';

      return html;
    }

    function applyDamageFromInput() {
      const input = document.getElementById('damage-raw-input');
      const raw = parseInt(input.value) || 0;
      if (raw <= 0) return;
      applyDamage(raw);
    }

    function applyDamage(raw) {
      const c = currentChar;
      const armour = calcArmourTotal();
      const gdBefore = c.gd.current;
      const vigBefore = c.virtues.vig.current;
      const afterArmour = Math.max(0, raw - armour);

      let summaryParts = ['Raw: <strong>' + raw + '</strong>'];
      summaryParts.push('<span class="damage-arrow">&rarr;</span> After armour(' + armour + '): <strong>' + afterArmour + '</strong>');

      if (afterArmour === 0) {
        lastDamageSummary = summaryParts.join(' ') + '<br><span style="color:var(--success);font-weight:bold">Armour absorbed all damage.</span>';
        addJournalEntry('Took ' + raw + ' raw damage — armour absorbed it all.', true);
        renderBattle();
        return;
      }

      if (c.gd.current > 0) {
        if (afterArmour >= c.gd.current) {
          const excess = afterArmour - c.gd.current;
          const gdWas = c.gd.current;
          updateChar(ch => { ch.gd.current = 0; });
          summaryParts.push('<span class="damage-arrow">&rarr;</span> GD: ' + gdWas + '&rarr;0');
          if (excess > 0) {
            // Excess damage — no scar, apply overflow to VIG
            summaryParts.push('(excess: ' + excess + ' &rarr; VIG)');
            lastDamageSummary = summaryParts.join(' ');
            addJournalEntry('GD broken by ' + raw + ' raw damage (after armour: ' + afterArmour + ', GD was ' + gdWas + '). Excess ' + excess + ' to VIG.', true);
            applyVigDamage(excess);
          } else {
            // GD reduced to exactly 0 — scar earned
            lastDamageSummary = summaryParts.join(' ') + '<br><span style="color:var(--warning);font-weight:bold">GD reduced to exactly 0 — Scar earned!</span>';
            addJournalEntry('GD reduced to exactly 0 by ' + raw + ' raw damage (after armour: ' + afterArmour + '). Scar earned!', true);
            scarFlow(0, () => { renderBattle(); });
          }
          return;
        } else {
          const gdAfter = c.gd.current - afterArmour;
          updateChar(ch => { ch.gd.current = gdAfter; });
          summaryParts.push('<span class="damage-arrow">&rarr;</span> GD: ' + gdBefore + '&rarr;' + gdAfter);
          lastDamageSummary = summaryParts.join(' ');
          addJournalEntry('Took ' + raw + ' raw damage (after armour: ' + afterArmour + '). GD ' + gdBefore + ' → ' + gdAfter + '.', true);
          renderBattle();
          return;
        }
      }

      // GD already 0 — all to VIG
      summaryParts.push('<span class="damage-arrow">&rarr;</span> GD already 0');
      lastDamageSummary = summaryParts.join(' ');
      applyVigDamage(afterArmour);
    }

    function applyVigDamage(damage) {
      const c = currentChar;
      const vigBefore = c.virtues.vig.current;
      const newVig = Math.max(0, vigBefore - damage);
      const vigLost = vigBefore - newVig;

      updateChar(ch => {
        ch.virtues.vig.current = newVig;
        ch.conditions.wounded = true;
      });

      // Update summary
      lastDamageSummary = (lastDamageSummary || '') + '<br>VIG: ' + vigBefore + '&rarr;' + newVig + ' (<span style="color:var(--danger)">-' + vigLost + '</span>)';

      if (newVig <= 0) {
        addJournalEntry(c.name + ' has been SLAIN.', true);
        lastDamageSummary += '<br><span style="color:var(--danger);font-weight:bold">SLAIN — VIG reduced to 0.</span>';
        renderBattle();
        showModal('<div class="panel"><h3 style="color:var(--danger)">SLAIN</h3><p>VIG reduced to 0.</p><button class="btn" onclick="hideModal()">OK</button></div>');
        return;
      }

      if (vigLost >= Math.ceil(vigBefore / 2)) {
        if (c.conditions.doomScar) {
          addJournalEntry('MORTAL WOUND with Doom Scar — SLAIN.', true);
          lastDamageSummary += '<br><span style="color:var(--danger);font-weight:bold">SLAIN — Mortal Wound with Doom Scar.</span>';
          renderBattle();
          showModal('<div class="panel"><h3 style="color:var(--danger)">SLAIN — Doom Scar</h3><p>Mortal Wound with Doom Scar active.</p><button class="btn" onclick="hideModal()">OK</button></div>');
        } else {
          updateChar(ch => { ch.conditions.mortalWound = true; });
          addJournalEntry('MORTAL WOUND — dies in 1 hour without aid.', true);
          lastDamageSummary += '<br><span style="color:var(--warning);font-weight:bold">MORTAL WOUND — dies in 1 hour without aid.</span>';
          renderBattle();
          showModal('<div class="panel"><h3 style="color:var(--warning)">MORTAL WOUND</h3><p>Lost ' + vigLost + ' VIG (half or more). Dies in 1 hour without aid.</p><button class="btn" onclick="hideModal()">OK</button></div>');
        }
      } else {
        addJournalEntry('Wounded — took ' + vigLost + ' VIG damage.', true);
        renderBattle();
      }
    }

            if (!knight) { preview.innerHTML = ''; return; }
            const propList = knight.property.map(p => {
              if (p.type === 'weapon') return `${p.name} (${p.dice}${p.tags && p.tags.length ? ', ' + p.tags.join(', ') : ''})`;
              if (p.type === 'armour') return `${p.name} (${p.armourType}, ${p.score})`;
              if (p.type === 'mount') return `${p.name} (Mount: VIG ${p.vig}, CLA ${p.cla}, SPI ${p.spi}, GD ${p.gd})`;
              return p.name;
            }).join('<br>');
            preview.innerHTML = `
              <div class="panel" style="margin-top:10px">
                <div class="panel-header">${knight.number}: ${knight.name}</div>
                <div class="panel-body">
                  <p><strong>Ability:</strong> ${knight.ability.name} — ${knight.ability.description}</p>
                  <p style="margin-top:6px"><strong>Passion:</strong> ${knight.passion.name} — ${knight.passion.description}</p>
                  <p style="margin-top:6px"><strong>Property:</strong><br>${propList}</p>
                </div>
              </div>
            `;
          });
        }
        // Hide cancel if no characters exist
        if (getCharIds().length === 0) {
          const cancelBtn = document.querySelector('#modal .modal-actions .btn:not(.btn-gold)');
          if (cancelBtn) cancelBtn.style.display = 'none';
        }
      }, 0);
    }

    function createCharFromModal() {
      const knightId = document.getElementById('nc-knight').value;
      const name = document.getElementById('nc-name').value.trim();
      const vig = parseInt(document.getElementById('nc-vig').value) || 10;
      const cla = parseInt(document.getElementById('nc-cla').value) || 10;
      const spi = parseInt(document.getElementById('nc-spi').value) || 10;
      const gd = parseInt(document.getElementById('nc-gd').value) || 1;

      if (!knightId) { alert('Please select a knight type.'); return; }

      const char = createDefaultChar(knightId === 'custom' ? 'custom' : knightId, name || 'New Knight');

      if (knightId === 'custom') {
        const abilityName = (document.getElementById('nc-ability-name')?.value || '').trim();
        const abilityDesc = (document.getElementById('nc-ability-desc')?.value || '').trim();
        const passionName = (document.getElementById('nc-passion-name')?.value || '').trim();
        const passionDesc = (document.getElementById('nc-passion-desc')?.value || '').trim();
        char.ability = { name: abilityName || 'Custom Ability', description: abilityDesc || '' };
        char.passion = { name: passionName || 'Custom Passion', description: passionDesc || '' };
      }

      // Set user-entered virtue values
      char.virtues.vig = { current: vig, max: vig };
      char.virtues.cla = { current: cla, max: cla };
      char.virtues.spi = { current: spi, max: spi };
      char.gd = { current: gd, max: gd };

      // Populate equipment from knight property
      const knight = KNIGHT_DB.find(k => k.id === knightId);
      if (knight) {
        knight.property.forEach(p => {
          if (p.type === 'weapon') {
            char.weapons.push({ ...p });
          } else if (p.type === 'armour') {
            char.armour.push({ ...p });
          } else if (p.type === 'mount') {
            char.mount = {
              name: p.name,
              vig: { current: p.vig, max: p.vig },
              cla: { current: p.cla, max: p.cla },
              spi: { current: p.spi, max: p.spi },
              gd: { current: p.gd, max: p.gd },
            };
          } else if (p.type === 'item') {
            char.inventory.push({ ...p });
          }
        });
      }

      registerCharId(char.id);
      saveChar(char);
      switchToChar(char.id);
      hideModal();
    }

    // === HEADER RENDERING ===

    function renderHeader() {
      const switcherEl = document.getElementById('char-switcher');
      const headerEl = document.getElementById('char-header');
      const ids = getCharIds();

      // Character switcher
      let switcherHtml = '<select id="char-select" style="max-width:160px">';
      ids.forEach(id => {
        const c = loadChar(id);
        if (c) {
          const selected = id === currentCharId ? ' selected' : '';
          switcherHtml += `<option value="${id}"${selected}>${c.name}</option>`;
        }
      });
      switcherHtml += '</select>';
      switcherHtml += ' <button class="btn btn-small btn-gold" onclick="showNewCharacterModal()">New</button>';
      switcherHtml += ' <button class="btn btn-small btn-danger" onclick="confirmDeleteChar()">Delete</button>';
      switcherHtml += ' <button class="btn btn-small" onclick="exportChar()" style="margin-left:8px">Export</button>' + helpBtn('export-char', true);
      switcherHtml += ' <button class="btn btn-small" onclick="importChar()">Import</button>' + helpBtn('import-char', true);
      switcherEl.innerHTML = switcherHtml;

      // Wire up character select change
      const charSelect = document.getElementById('char-select');
      if (charSelect) {
        charSelect.addEventListener('change', () => {
          switchToChar(charSelect.value);
        });
      }

      // Character header
      if (!currentChar) {
        headerEl.innerHTML = '';
        return;
      }

      const rank = getRank(currentChar.glory);
      headerEl.innerHTML = `
        <span class="char-name" contenteditable="true" id="char-name-edit">${currentChar.name}</span>
        <span class="char-detail">${getKnightLabel(currentChar.knightType)}</span>
        <span class="char-detail">
          Glory: <button class="btn btn-small" onclick="adjustGlory(-1)">-</button>
          <strong id="glory-display">${currentChar.glory}</strong>
          <button class="btn btn-small" onclick="adjustGlory(1)">+</button>
          ${helpBtn('glory', true)}
        </span>
        <span class="char-detail" style="color:var(--gold-light);font-weight:bold">${rank.rank}</span>
        <span class="char-detail">
          Age: ${helpBtn('age', true)}<select id="age-select" style="font-size:0.85rem">
            <option value="Young"${currentChar.age === 'Young' ? ' selected' : ''}>Young</option>
            <option value="Mature"${currentChar.age === 'Mature' ? ' selected' : ''}>Mature</option>
            <option value="Old"${currentChar.age === 'Old' ? ' selected' : ''}>Old</option>
          </select>
        </span>
        <span class="char-detail">
          Season: ${helpBtn('season', true)}<select id="season-select" style="font-size:0.85rem">
            <option value="Spring"${currentChar.season === 'Spring' ? ' selected' : ''}>Spring</option>
            <option value="Harvest"${currentChar.season === 'Harvest' ? ' selected' : ''}>Harvest</option>
            <option value="Winter"${currentChar.season === 'Winter' ? ' selected' : ''}>Winter</option>
          </select>
        </span>
      `;

      // Wire up contenteditable name
      const nameEl = document.getElementById('char-name-edit');
      if (nameEl) {
        nameEl.addEventListener('blur', () => {
          const newName = nameEl.textContent.trim();
          if (newName && newName !== currentChar.name) {
            updateChar(c => { c.name = newName; });
          }
        });
        nameEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
        });
      }

      // Wire up age select
      const ageSelect = document.getElementById('age-select');
      if (ageSelect) {
        ageSelect.addEventListener('change', () => {
          updateChar(c => { c.age = ageSelect.value; });
        });
      }

      // Wire up season select
      const seasonSelect = document.getElementById('season-select');
      if (seasonSelect) {
        seasonSelect.addEventListener('change', () => {
          updateChar(c => { c.season = seasonSelect.value; });
        });
      }
    }

    function getKnightLabel(knightId) {
      if (knightId === 'custom') return 'Custom Knight';
      const knight = KNIGHT_DB.find(k => k.id === knightId);
      return knight ? `${knight.number}: ${knight.name}` : knightId;
    }

    function adjustGlory(delta) {
      updateChar(c => {
        c.glory = Math.max(0, c.glory + delta);
      });
    }

    function confirmDeleteChar() {
      if (!currentChar) return;
      if (!confirm(`Delete "${currentChar.name}"? This cannot be undone.`)) return;
      const id = currentCharId;
      deleteChar(id);
      const ids = getCharIds();
      if (ids.length > 0) {
        switchToChar(ids[0]);
      } else {
        currentCharId = null;
        currentChar = null;
        localStorage.removeItem('mythicBastion_currentCharId');
        render();
        showNewCharacterModal();
      }
    }

    // === IMPORT / EXPORT ===

    function exportChar() {
      if (!currentChar) return;
      const data = JSON.stringify(currentChar, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (currentChar.name || 'knight').replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.json';
      a.click();
      URL.revokeObjectURL(url);
      localStorage.setItem('mythicBastion_lastBackup', new Date().toISOString());
      localStorage.setItem('mythicBastion_changeCount', '0');
      renderBackupIndicator();
    }

    function importChar() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            const chars = Array.isArray(parsed) ? parsed : [parsed];
            let imported = 0;
            let lastId = null;
            chars.forEach(char => {
              if (!char.name || !char.virtues || !char.gd) return;
              char.id = generateId();
              registerCharId(char.id);
              saveChar(char);
              lastId = char.id;
              imported++;
            });
            if (imported === 0) {
              alert('No valid characters found in file.');
              return;
            }
            switchToChar(lastId);
            addJournalEntry(`Imported ${imported} character${imported > 1 ? 's' : ''} from file.`, true);
          } catch (err) {
            alert('Failed to import: ' + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // === INIT ===

    function init() {
      // Tab switching
      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
          renderActiveTab();
        });
      });

      // Modal overlay click to close
      document.getElementById('modal-overlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          // Don't close if no characters exist (forced creation)
          if (getCharIds().length === 0) return;
          hideModal();
        }
      });

      // Load last character or show creation
      const lastId = localStorage.getItem('mythicBastion_currentCharId');
      const ids = getCharIds();
      if (lastId && ids.includes(lastId)) {
        switchToChar(lastId);
      } else if (ids.length > 0) {
        switchToChar(ids[0]);
      } else {
        showNewCharacterModal();
      }
      renderBackupIndicator();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
